upload_max_filesize = 2000M
post_max_size = 2000M
max_file_uploads = 20

; Memory and execution time
memory_limit = 256M
max_execution_time = 300
max_input_time = 300

; Enable file uploads
file_uploads = On

; Error reporting (for debugging)
display_errors = Off
log_errors = On
error_log = /path/to/error.log